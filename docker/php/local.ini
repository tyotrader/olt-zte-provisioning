; PHP Performance Configuration for OLT Provisioning System

; Enable OPcache (Critical for performance)
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.revalidate_freq=60
opcache.fast_shutdown=1
opcache.enable_file_override=1
opcache.validate_timestamps=1
opcache.save_comments=1

; Memory Limits
memory_limit=512M

; Execution Timeouts (important for SNMP operations)
max_execution_time=300
max_input_time=300

; File Uploads
upload_max_filesize=64M
post_max_size=64M

; Error Logging (disable in production for performance)
log_errors=On
error_log=/var/log/php/error.log
display_errors=Off
report_memleaks=On

; Session Configuration (use Redis in production)
session.save_handler=redis
session.save_path="tcp=redis:6379"

; SNMP Settings
snmp.default_value = 0
snmp.default_timeout = 5
snmp.default_retries = 3

; PCNTL (for queue workers)
pcntl_async_signals=On

; Realpath Cache (improves file I/O)
realpath_cache_size=4096K
realpath_cache_ttl=600

; MySQL PDO Optimization
pdo_mysql.cache_size = 2000
pdo_mysql.default_socket=

; JSON Performance
json.error_checking = On

; Opcache Blacklist (don't cache these)
; opcache.blacklist_filename=/usr/local/etc/php/opcache-blacklist.ini
